      <stop offset="0%" stop-color="#1c5a4a"/>
      <stop offset="46%" stop-color="#143a31"/>
      <stop offset="100%" stop-color="#0e241f"/>
    </radialGradient>
    <radialGradient id="topGlow" cx="50%" cy="0%" r="68%">
      <stop offset="0%" stop-color="#c78b25" stop-opacity=".42"/>
      <stop offset="34%" stop-color="#7d6330" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#c78b25" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="centerLift" cx="50%" cy="48%" r="44%">
