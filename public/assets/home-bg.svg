    <path id="spade" d="M0-58c-30 33-48 44-48 66 0 16 12 28 28 28 8 0 15-3 20-9-4 14-10 25-19 36h38C10 52 4 41 0 27c5 6 12 9 20 9 16 0 28-12 28-28 0-22-18-33-48-66z"/>
